<div class="container py-4">
	<h1 class="page-title">Explore Wineries</h1>

	<div class="filters-row">
		<div class="dropdown mr-3">
			<input type="search" [(ngModel)]="filterText" class="form-control" placeholder="Filter by Name...">
		</div>
		<div class="dropdown">
			<select class="form-control" id="winery" name="winery" [(ngModel)]="filterWinerySelect">
				<option value="" disabled selected>Producer</option>
				<option *ngFor="let winery of wineryList" value="{{winery}}">{{winery}}</option>
			</select>
		</div>
	</div>

	<div class="card wineries-card">
		<div class="card-body p-0">
			<div class="winery-table-header d-flex py-3 px-4">
				<div style="flex: 0.5;">Id</div>
				<div style="flex: 2;">Nome</div>
				<div style="flex: 2;">Luogo</div>
				<div style="flex: 1;">Denominazione</div>
				<div style="flex: 0.5; text-align: center;">Visitata?</div>
			</div>
			<div class="list-group list-group-flush">
				<div *ngFor="let winery of wineries | winesFilter: filterText; let i = index" class="winery-row list-group-item d-flex align-items-center py-3 px-4">
					<div class="col-text" style="flex: 0.5;">{{winery.id}}</div>
					<div style="flex: 2;">
						<a (click)="viewWineryDetails(winery, false)" class="winery-link">{{winery.name}}</a>
					</div>
					<div class="col-text" style="flex: 2;">{{winery.country}} - {{winery.region}} - {{winery.city}} - {{winery.village}} - {{winery.district}}</div>
					<div class="col-text" style="flex: 1;">{{winery.denomination}}</div>
					<div style="flex: 0.5; text-align: center;">
						<i [ngClass]="isWineryVisited(winery.id) ? ['fas', 'fa-check', 'visited-icon'] : ['fas', 'fa-xmark', 'not-visited-icon']" aria-hidden="true"></i>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Loading indicator -->
	<div *ngIf="isLoadingMore" class="scroll-loading">
		<div class="scroll-spinner"></div>
		<span>Caricamento...</span>
	</div>

	<!-- All loaded message -->
	<div *ngIf="!hasMore && wineries.length > 0" class="scroll-end">
		Tutte le {{ wineries.length }} cantine caricate
	</div>

	<!-- Empty state -->
	<div *ngIf="!isLoadingMore && wineries.length === 0" class="scroll-end">
		Nessuna cantina trovata.
	</div>

	<!-- Intersection sentinel — triggers loadMore() when visible -->
	<div #scrollAnchor style="height: 1px;"></div>
</div>
