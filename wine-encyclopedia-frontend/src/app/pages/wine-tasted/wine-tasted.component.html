<div class="container py-4">
	<h1 class="page-title">Vini degustati</h1>

	<div class="filters-row">
		<div class="dropdown mr-3">
			<select class="form-control">
				<option value="" disabled selected>Vintage</option>
				<!-- Add vintage options dynamically if available -->
			</select>
		</div>
		<div class="dropdown mr-3">
			<select class="form-control">
				<option value="" disabled selected>Vitigno</option>
				<!-- Add varietal options dynamically if available -->
			</select>
		</div>
		<div class="dropdown mr-3">
			<select class="form-control">
				<option value="" disabled selected>Produttore</option>
				<!-- Add producer options dynamically if available -->
			</select>
		</div>
		<div class="dropdown">
			<select class="form-control">
				<option value="" disabled selected>Punteggio</option>
				<!-- Add rating options dynamically if available -->
			</select>
		</div>
	</div>

	<div class="card tasted-card">
		<div class="card-body p-0">
			<div class="tasted-table-header d-flex py-3 px-4">
				<div style="flex: 2;">Vino</div>
				<div style="flex: 1;">Annata</div>
				<div style="flex: 1.5;">Vitigno</div>
				<div style="flex: 1;">Produttore</div>
				<div style="flex: 0.5;">Score</div>
				<div style="flex: 1;">Data degustazione</div>
				<div style="flex: 0.5;">Scheda</div>
			</div>
			<div class="list-group list-group-flush">
				<div *ngFor="let wine of wines" class="tasted-row list-group-item d-flex align-items-center py-3 px-4">
					<div class="wine-name-col" style="flex: 2; display: flex; align-items: center;">
						<img [src]="getWineIcon(wine)" alt="Wine Icon" class="wine-icon">
						<a (click)="viewWineDetails(wine)">{{ wine.name }}</a>
					</div>
					<div class="col-text" style="flex: 1;">{{ wine.vintage }}</div>
					<div class="col-text" style="flex: 1.5;">{{ wine.grapeVariety }}</div>
					<div class="col-text" style="flex: 1;">{{ wine.winery }}</div>
					<div class="col-text" style="flex: 0.5;">{{ wine.score }}</div>
					<div class="col-text" style="flex: 1;">
						{{ (wine.createdAt?.toDate ? wine.createdAt.toDate() : wine.createdAt) | date:'dd/MM/yyyy' }}
					</div>
					<div style="flex: 0.5;"><button class="btn btn-primary btn-sm" (click)="updateTastedWine(wine)">Apri</button></div>
				</div>
			</div>
		</div>
	</div>
</div>
